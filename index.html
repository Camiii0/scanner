<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PDF417 Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c10;color:#ddeeff;font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes sweep{0%{top:4%}50%{top:88%}100%{top:4%}}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
header{width:100%;max-width:480px;padding:20px 16px 4px;display:flex;align-items:center;gap:12px}
.logo{width:44px;height:44px;background:linear-gradient(135deg,#00e5ff,#00ff88);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.title{font-size:1.2rem;font-weight:900;letter-spacing:1px}
.title span{color:#00e5ff}
.sub{font-size:.58rem;color:#445566;letter-spacing:3px;text-transform:uppercase;margin-top:2px}
main{width:100%;max-width:480px;padding:10px 16px 40px;display:flex;flex-direction:column;gap:10px}
.cam-row{display:flex;align-items:center;gap:8px;display:none}
.cam-lbl{font-size:.6rem;color:#445566;text-transform:uppercase;letter-spacing:2px;white-space:nowrap}
select{flex:1;background:#0f1419;border:1px solid #1a2030;color:#ddeeff;padding:7px 10px;border-radius:8px;font-family:inherit;font-size:.7rem;outline:none}
.cam-wrap{position:relative;width:100%;aspect-ratio:4/3;border-radius:14px;overflow:hidden;background:#000;border:1px solid #1a2030;transition:border-color .3s}
.cam-wrap.active{border-color:#00e5ff;box-shadow:0 0 0 1px #00e5ff33}
video{width:100%;height:100%;object-fit:cover;display:block}
canvas#snap{display:none}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.frame{width:88%;height:32%;position:relative}
.corner{position:absolute;width:20px;height:20px;border-color:#00e5ff;border-style:solid}
.tl{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00e5ff,transparent);top:4%;box-shadow:0 0 8px #00e5ff;display:none;animation:sweep 2s ease-in-out infinite}
.line.on{display:block}
.hint{position:absolute;bottom:-24px;left:0;right:0;text-align:center;font-size:.58rem;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase}
.status{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#0f1419;border-radius:10px;border:1px solid #1a2030}
.dot{width:8px;height:8px;border-radius:50%;background:#445566;flex-shrink:0;transition:background .3s}
.dot.scan{background:#00ff88;animation:blink 1s infinite}
.dot.ok{background:#00ff88}
.dot.err{background:#ff4060}
.dot.load{background:#00e5ff;animation:blink .5s infinite}
#msg{font-size:.73rem;color:#445566;flex:1}
.btns{display:flex;gap:8px}
.btn{flex:1;padding:13px 0;border:none;border-radius:10px;font-weight:800;font-size:.88rem;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all .15s}
.btn-go{background:#00ff88;color:#000}
.btn-go:disabled{opacity:.4;cursor:not-allowed}
.btn-stop{background:#0f1419;color:#ddeeff;border:1px solid #1a2030}
.btn-stop:disabled{opacity:.3;cursor:not-allowed}
.result{background:#0f1419;border:1px solid #00ff8844;border-radius:14px;overflow:hidden;display:none}
.result.show{display:block;animation:pop .3s ease}
.rh{padding:11px 14px;border-bottom:1px solid #1a2030;display:flex;align-items:center;justify-content:space-between}
.rtitle{font-size:.72rem;color:#00ff88;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.badge{background:#00ff8818;color:#00ff88;padding:2px 10px;border-radius:99px;font-size:.6rem;letter-spacing:1px}
.rb{padding:14px}
.raw{font-size:.67rem;color:#7799bb;line-height:1.8;word-break:break-all;background:rgba(0,0,0,.4);padding:10px;border-radius:8px;margin-bottom:12px;border:1px solid #1a2030;max-height:80px;overflow-y:auto;white-space:pre-wrap}
table{width:100%;border-collapse:collapse;font-size:.82rem}
tr{border-bottom:1px solid #1a2030}
tr:last-child{border:none}
td{padding:8px 6px;vertical-align:top}
td:first-child{color:#445566;font-size:.63rem;text-transform:uppercase;letter-spacing:1px;width:35%;padding-right:10px}
td:last-child{font-weight:700;color:#ddeeff}
.actions{display:flex;gap:8px;margin-top:12px}
.abtn{flex:1;padding:9px;border-radius:8px;font-family:inherit;font-size:.68rem;cursor:pointer;letter-spacing:1px;font-weight:700}
.abtn-copy{background:#00e5ff12;border:1px solid #00e5ff33;color:#00e5ff}
.abtn-new{background:#1a2030;border:none;color:#445566}
.loader{text-align:center;padding:20px;font-size:.75rem;color:#445566}
</style>
</head>
<body>

<header>
  <div class="logo">📷</div>
  <div>
    <div class="title">PDF<span>417</span> SCANNER</div>
    <div class="sub">Lector · Cédula Colombiana</div>
  </div>
</header>

<main>
  <div class="cam-row" id="camRow">
    <span class="cam-lbl">CAM</span>
    <select id="camSel" onchange="onCamChange()"></select>
  </div>

  <div class="cam-wrap" id="camWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="snap"></canvas>
    <div class="overlay">
      <div class="frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="line" id="line"></div>
        <div class="hint" id="hintTxt">Toca Iniciar</div>
      </div>
    </div>
  </div>

  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="msg">Cargando detector...</span>
  </div>

  <div class="btns">
    <button class="btn btn-go" id="btnGo" onclick="startScan()" disabled>▶ INICIAR</button>
    <button class="btn btn-stop" id="btnStop" onclick="stopScan()" disabled>■ PARAR</button>
  </div>

  <div class="result" id="result">
    <div class="rh">
      <span class="rtitle">RESULTADO</span>
      <span class="badge" id="fmtBadge">PDF417</span>
    </div>
    <div class="rb">
      <div class="raw" id="rawOut"></div>
      <table><tbody id="tbl"></tbody></table>
      <div class="actions">
        <button class="abtn abtn-copy" onclick="copyIt()">COPIAR</button>
        <button class="abtn abtn-new" onclick="newScan()">NUEVO</button>
      </div>
    </div>
  </div>
</main>

<!-- Load ZXing from multiple sources -->
<script>
(function loadZXing() {
  const sources = [
    'https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js',
    'https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.20.0/index.min.js',
  ];
  let idx = 0;
  function tryNext() {
    if (idx >= sources.length) {
      document.getElementById('msg').textContent = 'Error: activa JavaScript/CDN en el navegador';
      document.getElementById('dot').className = 'dot err';
      return;
    }
    const s = document.createElement('script');
    s.src = sources[idx++];
    s.onload = () => { window._zxingLoaded = true; init(); };
    s.onerror = () => { document.head.removeChild(s); tryNext(); };
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>

<script>
let reader = null, scanning = false, cameras = [], raf = null;

const video   = document.getElementById('video');
const dot     = document.getElementById('dot');
const msg     = document.getElementById('msg');
const btnGo   = document.getElementById('btnGo');
const btnStop = document.getElementById('btnStop');
const line    = document.getElementById('line');
const camWrap = document.getElementById('camWrap');
const camRow  = document.getElementById('camRow');
const camSel  = document.getElementById('camSel');
const result  = document.getElementById('result');
const rawOut  = document.getElementById('rawOut');
const tbl     = document.getElementById('tbl');
const hint    = document.getElementById('hintTxt');

function st(state, text) {
  dot.className = 'dot ' + (state||'');
  msg.textContent = text;
}

async function init() {
  st('load', 'Solicitando permiso de cámara...');
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({ video: true });
    tmp.getTracks().forEach(t => t.stop());
    const devs = await navigator.mediaDevices.enumerateDevices();
    cameras = devs.filter(d => d.kind === 'videoinput');
    if (cameras.length > 1) {
      camRow.style.display = 'flex';
      cameras.forEach((c, i) => {
        const o = document.createElement('option');
        o.value = c.deviceId;
        o.textContent = c.label || 'Cámara ' + (i + 1);
        if (/back|rear|trasera|2/i.test(c.label)) o.selected = true;
        camSel.appendChild(o);
      });
    }
    btnGo.disabled = false;
    st('', 'Listo. Toca INICIAR');
  } catch(e) {
    st('err', 'Permiso de cámara denegado. Revisa ajustes.');
  }
}

async function startScan() {
  if (scanning) return;
  scanning = true;
  btnGo.disabled = true;
  btnStop.disabled = false;
  line.classList.add('on');
  camWrap.classList.add('active');
  result.classList.remove('show');
  hint.textContent = 'Alinea el código PDF417 aquí';
  st('scan', 'Escaneando... apunta al código');

  const Z = window.ZXing;
  const hints = new Map();
  hints.set(Z.DecodeHintType.POSSIBLE_FORMATS, [
    Z.BarcodeFormat.PDF_417,
    Z.BarcodeFormat.CODE_128,
    Z.BarcodeFormat.QR_CODE,
    Z.BarcodeFormat.DATA_MATRIX,
  ]);
  hints.set(Z.DecodeHintType.TRY_HARDER, true);

  reader = new Z.BrowserMultiFormatReader(hints);
  const devId = camSel.value;
  const constraints = devId ? { deviceId: { exact: devId } } : { facingMode: 'environment' };

  try {
    await reader.decodeFromConstraints({ video: constraints }, video, (res, err) => {
      if (res) onFound(res);
    });
  } catch(e) {
    st('err', 'Error cámara: ' + e.message);
    stopScan();
  }
}

function stopScan() {
  scanning = false;
  if (reader) { reader.reset(); reader = null; }
  line.classList.remove('on');
  camWrap.classList.remove('active');
  btnGo.disabled = false;
  btnStop.disabled = true;
  hint.textContent = 'Toca Iniciar';
  if (!result.classList.contains('show')) st('', 'Detenido.');
}

function onFound(res) {
  const text = res.getText();
  const Z = window.ZXing;
  const fmt = Z.BarcodeFormat[res.getBarcodeFormat()] || 'BARCODE';
  stopScan();
  st('ok', '✓ Código detectado: ' + fmt);
  document.getElementById('fmtBadge').textContent = fmt;
  rawOut.textContent = text;
  buildTable(text);
  result.classList.add('show');
  result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function buildTable(text) {
  tbl.innerHTML = '';
  const row = (l, v) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${l}</td><td>${v}</td>`;
    tbl.appendChild(tr);
  };
  const m = text.match(/P-(\d+)-(\d+)-([MFmf])-(\d+)-(\d{8})/);
  if (m) {
    const [, t1, t2, sex, ced, dr] = m;
    row('Tipo', 'Persona (P)');
    row('Código 1', t1);
    row('Código 2', t2);
    row('Sexo', sex.toUpperCase() === 'M' ? 'Masculino' : 'Femenino');
    row('Cédula', ced);
    row('Fecha exp.', dr.slice(0,4)+'-'+dr.slice(4,6)+'-'+dr.slice(6,8));
  } else {
    const parts = text.split(/[\n\r\t;|~]+/).filter(Boolean);
    parts.length > 1
      ? parts.forEach((p, i) => row('Campo ' + (i+1), p.trim()))
      : row('Datos', text);
  }
}

function copyIt() {
  navigator.clipboard && navigator.clipboard.writeText(rawOut.textContent).then(() => {
    const b = document.querySelector('.abtn-copy');
    b.textContent = '✓ COPIADO';
    setTimeout(() => b.textContent = 'COPIAR', 2000);
  });
}

function newScan() {
  result.classList.remove('show');
  st('', 'Listo. Toca INICIAR');
}

function onCamChange() {
  if (scanning) { stopScan(); setTimeout(startScan, 300); }
}
</script>
</body>
</html>
